# These are the services shared by all Beeper self-hosted bridges
services:
  beeper-bridge:
    image: ghcr.io/beeper/bridge-manager
    user: 1000:1000
    env_file: ./.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

